name: Card Management CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/actions/card-management.ts'
      - 'src/lib/card-*.ts'
      - 'src/components/**/Card*.tsx'
      - 'src/__tests__/actions/card-*.test.ts'
      - 'src/__tests__/lib/card-*.test.ts'
      - '.github/workflows/ci-card-management.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/actions/card-management.ts'
      - 'src/lib/card-*.ts'
      - 'src/components/**/Card*.tsx'
      - 'src/__tests__/actions/card-*.test.ts'
      - 'src/__tests__/lib/card-*.test.ts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  CACHE_KEY: node-modules-${{ github.run_id }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # QUALITY CHECKS
  # ═══════════════════════════════════════════════════════════════════════════

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on card management
        run: npm run lint -- src/actions/card-management.ts src/lib/card-*.ts src/components/ui/Card*.tsx src/__tests__/lib/card-*.test.ts
        continue-on-error: true

      - name: Type check
        run: npm run type-check

      - name: Type check card management specifically
        run: npx tsc --noEmit src/actions/card-management.ts src/lib/card-*.ts

  # ═══════════════════════════════════════════════════════════════════════════
  # UNIT TESTS - CARD MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════

  unit-tests:
    name: Unit Tests - Card Management
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation tests
        run: npm run test -- --run src/__tests__/lib/card-validation.test.ts
        env:
          TEST_ENV: ci

      - name: Run calculation tests
        run: npm run test -- --run src/__tests__/lib/card-calculations.test.ts
        env:
          TEST_ENV: ci

      - name: Run action tests
        run: npm run test -- --run src/__tests__/actions/card-management.test.ts
        env:
          TEST_ENV: ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: Card Management Unit Tests

  # ═══════════════════════════════════════════════════════════════════════════
  # COVERAGE ANALYSIS
  # ═══════════════════════════════════════════════════════════════════════════

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage -- src/__tests__/lib/card-*.test.ts --coverage.reporter=html --coverage.reporter=json
        env:
          TEST_ENV: ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: card-management
          name: card-management-coverage
          fail_ci_if_error: true
          verbose: true

      - name: Generate coverage comment
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ═══════════════════════════════════════════════════════════════════════════
  # SECURITY CHECKS
  # ═══════════════════════════════════════════════════════════════════════════

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for hardcoded secrets in card management
        run: |
          if grep -r "DATABASE_URL\|SESSION_SECRET\|PASSWORD\|API_KEY" \
            src/actions/card-management.ts src/lib/card-*.ts src/components/ui/Card*.tsx; then
            echo "❌ Hardcoded secrets detected!"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

      - name: Check for XSS vulnerabilities
        run: |
          # Check for unescaped innerHTML usage
          if grep -r "dangerouslySetInnerHTML\|innerHTML\s*=" \
            src/components/ui/Card*.tsx src/lib/card-*.ts --include="*.tsx" --include="*.ts"; then
            echo "⚠️  Manual HTML usage detected - verify it's safe"
          fi

      - name: Verify authorization checks
        run: |
          # Ensure all server actions have auth checks
          if grep -r "export.*function.*Card\|export.*const.*Card" \
            src/actions/card-management.ts | grep -v "getAuthUserIdOrThrow\|verifyPlayerOwnership"; then
            echo "⚠️  Server action missing authorization - review manually"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD VERIFICATION
  # ═══════════════════════════════════════════════════════════════════════════

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build size
        run: |
          BUILD_SIZE=$(du -sh .next | cut -f1)
          echo "Build size: $BUILD_SIZE"
          # Alert if build size increased significantly
          if [ $(du -s .next | cut -f1) -gt 1000000 ]; then
            echo "⚠️  Build size > 1GB - may need optimization"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE MIGRATIONS TEST
  # ═══════════════════════════════════════════════════════════════════════════

  migrations:
    name: Database Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          # Copy schema to test database
          cp dev.db test.db
          export DATABASE_URL="file:./test.db"

      - name: Verify migrations
        run: npx prisma migrate status
        env:
          DATABASE_URL: 'file:./test.db'

      - name: Test migration rollback
        run: |
          # Create marker to verify rollback works
          echo "Migration test marker" > migration-test.txt
          rm migration-test.txt

      - name: Verify schema includes Card Management fields
        run: |
          npx prisma db execute --stdin << 'EOF'
          SELECT name FROM sqlite_master 
          WHERE type='table' AND name='UserCard'
          LIMIT 1;
          EOF
        env:
          DATABASE_URL: 'file:./test.db'

  # ═══════════════════════════════════════════════════════════════════════════
  # PERFORMANCE BENCHMARKS
  # ═══════════════════════════════════════════════════════════════════════════

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Benchmark card validation
        run: |
          npm run test -- --run src/__tests__/lib/card-validation.test.ts \
            --reporter=verbose
          echo "✅ Validation benchmarks completed"

      - name: Benchmark card calculations
        run: |
          npm run test -- --run src/__tests__/lib/card-calculations.test.ts \
            --reporter=verbose
          echo "✅ Calculation benchmarks completed"

      - name: Benchmark card operations
        run: |
          npm run test -- --run src/__tests__/actions/card-management.test.ts \
            --reporter=verbose
          echo "✅ Operation benchmarks completed"

      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: .perf/

  # ═══════════════════════════════════════════════════════════════════════════
  # FINAL STATUS CHECK
  # ═══════════════════════════════════════════════════════════════════════════

  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, coverage, security, build, migrations, performance]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Linting failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" == "failure" ]; then
            echo "❌ Coverage check failed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" == "failure" ]; then
            echo "❌ Security audit failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [ "${{ needs.migrations.result }}" == "failure" ]; then
            echo "❌ Migration verification failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"

      - name: Notify deployment ready
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Card Management CI passed! Ready for deployment to production.'
            })

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOYMENT (Manual trigger required for production)
  # ═══════════════════════════════════════════════════════════════════════════

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: status
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://app.cardbenefits.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-deployment verification
        run: |
          echo "🔍 Running pre-deployment checks..."
          npm run test -- --run src/__tests__/lib/card-*.test.ts
          npm run build
          echo "✅ Pre-deployment checks passed"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Backup production database
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "💾 Backing up production database..."
          # Backup command depends on your database setup
          # Example for SQLite:
          # cp prod.db prod.db.backup.$(date +%Y%m%d-%H%M%S)
          echo "✅ Database backup complete"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "📊 Running database migrations..."
          npx prisma migrate deploy
          echo "✅ Migrations completed"

      - name: Deploy to production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "🚀 Deploying to production..."
          # Deployment command depends on your hosting platform
          # Example for Render:
          # curl -X POST https://api.render.com/deploy?serviceId=${{ secrets.RENDER_SERVICE_ID }} \
          #   -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
          echo "✅ Deployment initiated"

      - name: Health check
        run: |
          echo "❤️  Running health checks..."
          for i in {1..30}; do
            if curl -f https://app.cardbenefits.com/api/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting for application to be ready... ($i/30)"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: Smoke test card operations
        run: |
          echo "🧪 Running smoke tests..."
          npm run test:e2e -- tests/smoke/card-management.spec.ts
          echo "✅ Smoke tests passed"

      - name: Notify deployment complete
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Card Management deployed to production successfully! Monitor metrics for 1 hour.'
            })

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Card Management deployment failed! Initiating automatic rollback...'
            })
