## 📋 Test Suite Files Required

The following test files must exist for CI/CD to pass:

### Unit Tests
- `tests/lib/import/parser.test.ts` - CSV/XLSX parsing
- `tests/lib/import/validator.test.ts` - Data validation
- `tests/lib/import/duplicate-detector.test.ts` - Duplicate detection
- `tests/lib/import/committer.test.ts` - Database commits
- `tests/lib/export/exporter.test.ts` - Export functionality
- `tests/actions/import.test.ts` - Server action tests
- `tests/actions/export.test.ts` - Export server actions

### Integration Tests
- `tests/integration/import-export/workflow.test.ts` - Complete workflow
- `tests/integration/import-export/rollback.test.ts` - Rollback scenarios
- `tests/integration/import-export/concurrency.test.ts` - Concurrent imports

### E2E Tests
- `tests/e2e/import-export/upload-wizard.spec.ts` - Import wizard flow
- `tests/e2e/import-export/export-flow.spec.ts` - Export functionality
- `tests/e2e/import-export/error-handling.spec.ts` - Error scenarios

### Performance Tests
- `tests/benchmarks/parser.bench.ts` - Parser performance
- `tests/benchmarks/validation.bench.ts` - Validation performance

