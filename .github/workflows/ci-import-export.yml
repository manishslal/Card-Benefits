## 🔒 Security Checks in Pipeline

### 1. File Upload Validation
```typescript
// Magic bytes verification
const CSV_MAGIC = [0x2C]; // Comma or printable
const XLSX_MAGIC = [0x50, 0x4B, 0x03, 0x04]; // PK (ZIP)

function validateMagicBytes(buffer: Uint8Array, ext: string): boolean {
  if (ext === '.csv') {
    return buffer[0] >= 0x20 && buffer[0] <= 0x7E;
  }
  if (ext === '.xlsx') {
    return buffer.slice(0, 4).every((b, i) => b === XLSX_MAGIC[i]);
  }
  return false;
}
```

### 2. Hardcoded Secrets Detection
```bash
# Pipeline checks for hardcoded secrets
! grep -r "password\|SECRET\|api_key\|token" src/lib/import src/lib/export
```

### 3. SQL Injection Prevention
```bash
# Verify Prisma parameterized queries (no raw SQL)
! grep -r "\.raw\|sql\`" src/lib/import src/lib/export
```

