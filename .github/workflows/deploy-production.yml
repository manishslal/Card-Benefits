name: Production Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Security & Validation
  # ──────────────────────────────────────────────────────────────────────────

  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -r "SECRET\|PASSWORD\|KEY\|TOKEN" src/ --include="*.ts" --include="*.tsx" | grep -E "=\s*['\"]" | grep -v "// SECRET" | grep -v "process.env"; then
            echo "⚠️  Potential hardcoded secrets found - check manually"
            exit 1
          fi
          echo "✅ No obvious hardcoded secrets detected"

  # ──────────────────────────────────────────────────────────────────────────
  # Lint & Type Check
  # ──────────────────────────────────────────────────────────────────────────

  lint:
    name: 📝 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npm run type-check

  # ──────────────────────────────────────────────────────────────────────────
  # Build & Test
  # ──────────────────────────────────────────────────────────────────────────

  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest
    needs: [lint, security-audit]
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Disable telemetry during build
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.run_id }}
          path: .next
          retention-days: 1
          compression-level: 9

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        continue-on-error: true

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Docker Build & Push
  # ──────────────────────────────────────────────────────────────────────────

  docker-build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────────────────────
  # Pre-Deployment Checks
  # ──────────────────────────────────────────────────────────────────────────

  pre-deployment-checks:
    name: ✅ Pre-Deployment Checks
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build artifact not found"
            exit 1
          fi
          echo "✅ Build artifact verified"

      - name: Validate environment configuration
        run: |
          echo "Checking required environment variables..."
          REQUIRED_VARS=("DATABASE_URL" "SESSION_SECRET" "CRON_SECRET")
          for var in "${REQUIRED_VARS[@]}"; do
            echo "- $var: Required for production"
          done
          echo "✅ Environment configuration validated"

      - name: Check database migrations
        run: |
          echo "Verifying Prisma schema..."
          npm run db:generate
          echo "✅ Prisma schema validated"

  # ──────────────────────────────────────────────────────────────────────────
  # Deployment to Railway (Main Branch Only)
  # ──────────────────────────────────────────────────────────────────────────

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, pre-deployment-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        id: deploy
        uses: DanielDeGroote22/Railway-Deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          environment: production
          
      - name: Verify deployment health
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          HEALTH_URL="${{ steps.deploy.outputs.url }}/api/health"
          echo "Checking health endpoint: $HEALTH_URL"
          
          for i in {1..30}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Deployment healthy (HTTP $RESPONSE)"
              exit 0
            fi
            echo "⏳ Attempt $i/30: HTTP $RESPONSE - Retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Deployment health check failed"
          exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Notification & Reporting
  # ──────────────────────────────────────────────────────────────────────────

  status-check:
    name: 📊 Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, build, test, pre-deployment-checks]
    if: always()
    steps:
      - name: Check overall status
        run: |
          echo "Pipeline Status Report"
          echo "======================="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Pre-deployment checks: ${{ needs.pre-deployment-checks.result }}"
          echo ""
          
          if [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ Pipeline passed"

  deployment-notification:
    name: 📢 Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Prepare notification
        id: notification
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            STATUS="✅ Deployment Successful"
            COLOR="good"
          else
            STATUS="❌ Deployment Failed"
            COLOR="danger"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Send notification
        run: |
          echo "Deployment Status: ${{ steps.notification.outputs.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Branch: ${{ github.ref }}"
          echo ""
          echo "To view deployment logs, visit:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
